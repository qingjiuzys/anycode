# Build VitePress site from docs-site/ and publish to GitHub Pages.
name: Docs

on:
  push:
    branches: [main, master]
    paths:
      - 'docs-site/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install deps
        working-directory: docs-site
        run: npm ci || npm install

      - name: Build VitePress
        working-directory: docs-site
        env:
          # 与仓库名一致，项目站 URL：https://qingjiuzys.github.io/anycode/
          VITEPRESS_BASE: /anycode/
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4

# macOS desktop bundle (Tauri) — tag push uploads DMG only.
# Linux/Windows desktop jobs run on workflow_dispatch only (CLI tarballs ship via release-binaries.yml).
#
# Optional signing/notarization (requires repository secrets):
#   APPLE_CERTIFICATE_BASE64, APPLE_CERTIFICATE_PASSWORD,
#   APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
name: Desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write

env:
  ANYCODE_BROWSER_NODE_VERSION: "22.16.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  desktop-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/anycode-desktop

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            crates/dashboard-ui/package-lock.json
            apps/anycode-desktop/browser-mcp/package-lock.json

      - name: Cache browser MCP bundle
        uses: actions/cache@v4
        with:
          path: |
            apps/anycode-desktop/resources/browser/
            apps/anycode-desktop/browser-mcp/node_modules/
          key: browser-mcp-${{ hashFiles('apps/anycode-desktop/browser-mcp/package-lock.json') }}-${{ env.ANYCODE_BROWSER_NODE_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Import signing certificate (optional)
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_CERTIFICATE_BASE64:-}" ]]; then
            echo "Skipping Apple signing import (APPLE_CERTIFICATE_BASE64 not set)"
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/apple-signing.p12"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

      - name: Configure Apple notarization (optional)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [[ -n "${APPLE_ID:-}" && -n "${APPLE_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ]]; then
            echo "APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"
            echo "Apple notarization env configured"
          else
            echo "Skipping notarization (Apple ID secrets not configured)"
          fi

      - name: Build desktop release
        run: |
          set -euo pipefail
          if [[ -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]]; then
            export APPLE_SIGNING_IDENTITY="${{ secrets.APPLE_SIGNING_IDENTITY }}"
          else
            export APPLE_SIGNING_IDENTITY="-"
          fi
          ./scripts/build-desktop-release.sh

      - name: Upload macOS DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/anycode-desktop/target/release/bundle/dmg/*.dmg

      - name: Upload macOS bundle (CI artifact)
        uses: actions/upload-artifact@v4
        with:
          name: anycode-desktop-macos
          path: |
            apps/anycode-desktop/target/release/bundle/dmg/*.dmg
            apps/anycode-desktop/target/release/bundle/macos/*.app
          if-no-files-found: warn

  desktop-windows:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/anycode-desktop

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            crates/dashboard-ui/package-lock.json
            apps/anycode-desktop/browser-mcp/package-lock.json

      - name: Cache browser MCP bundle
        uses: actions/cache@v4
        with:
          path: |
            apps/anycode-desktop/resources/browser/
            apps/anycode-desktop/browser-mcp/node_modules/
          key: browser-mcp-${{ hashFiles('apps/anycode-desktop/browser-mcp/package-lock.json') }}-${{ env.ANYCODE_BROWSER_NODE_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build desktop release (Windows)
        shell: bash
        run: ./scripts/build-desktop-release.sh

      - name: Upload Windows bundle (CI artifact)
        uses: actions/upload-artifact@v4
        with:
          name: anycode-desktop-windows
          path: |
            apps/anycode-desktop/target/release/bundle/msi/*.msi
            apps/anycode-desktop/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload Windows installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/anycode-desktop/target/release/bundle/msi/*.msi
            apps/anycode-desktop/target/release/bundle/nsis/*.exe

  desktop-linux:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/anycode-desktop

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            crates/dashboard-ui/package-lock.json
            apps/anycode-desktop/browser-mcp/package-lock.json

      - name: Cache browser MCP bundle
        uses: actions/cache@v4
        with:
          path: |
            apps/anycode-desktop/resources/browser/
            apps/anycode-desktop/browser-mcp/node_modules/
          key: browser-mcp-${{ hashFiles('apps/anycode-desktop/browser-mcp/package-lock.json') }}-${{ env.ANYCODE_BROWSER_NODE_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgomp1

      - name: Build desktop release (Linux)
        run: ./scripts/build-desktop-release.sh

      - name: Upload Linux bundle (CI artifact)
        uses: actions/upload-artifact@v4
        with:
          name: anycode-desktop-linux
          path: |
            apps/anycode-desktop/target/release/bundle/deb/*.deb
            apps/anycode-desktop/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload Linux packages to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/anycode-desktop/target/release/bundle/deb/*.deb
            apps/anycode-desktop/target/release/bundle/appimage/*.AppImage

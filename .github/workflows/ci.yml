name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check workspace version sync
        run: ./scripts/sync-workspace-version.sh --check

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: Build dashboard UI (embed + clippy/test)
        run: ANYCODE_BUILD_DASHBOARD_UI=1 ./scripts/build-dashboard-ui.sh

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace

      - name: cargo test (tools-lsp)
        run: cargo test -p anycode-tools --features tools-lsp

      - name: cargo test (tools-mcp)
        run: cargo test -p anycode-tools --features tools-mcp

      - name: cargo check (knowledge-embeddings)
        run: cargo check -p anycode-tools --features knowledge-embeddings

      - name: Build release binary
        run: ANYCODE_BUILD_DASHBOARD_UI=1 cargo build --release -p anycode --features embedded-ui

      - name: Eval harness (mock scenarios)
        run: ANYCODE_EVAL_BIN=target/release/anycode python3 scripts/eval/run.py --with-mock

  dashboard-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: crates/dashboard-ui/package-lock.json

      - name: Install dashboard-ui deps
        working-directory: crates/dashboard-ui
        run: npm ci

      - name: dashboard-ui test
        working-directory: crates/dashboard-ui
        run: npm test

      - name: dashboard-ui build
        working-directory: crates/dashboard-ui
        run: npm run build

      - name: Install Playwright browsers
        working-directory: crates/dashboard-ui
        run: npx playwright install --with-deps chromium

      - name: Build anycode for e2e
        run: ANYCODE_BUILD_DASHBOARD_UI=1 cargo build --release -p anycode --features embedded-ui

      - name: dashboard-ui e2e
        working-directory: crates/dashboard-ui
        run: npm run test:e2e

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install docs deps
        working-directory: docs-site
        run: npm ci || npm install

      - name: VitePress build (link check)
        working-directory: docs-site
        run: npm run build

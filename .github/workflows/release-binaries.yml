# 打 tag（如 v0.1.0）时构建并上传 anycode-<target>.tar.gz，与 scripts/install.sh 约定一致。
name: Release binaries

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: cargo build
        run: cargo build -p anycode --release --target ${{ matrix.target }}

      - name: Package tarball
        id: pack
        run: |
          ASSET="anycode-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czvf "$ASSET" anycode
          echo "path=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.path }}

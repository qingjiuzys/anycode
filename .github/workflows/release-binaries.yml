# 打 tag（如 v0.1.0）时构建并上传 Linux/Windows CLI：
# - Unix: anycode-<asset-target>.tar.gz（linux 包名去掉三元组中的 unknown）
# - Windows: anycode-<target>.zip
# macOS 用户请下载 desktop-release 产出的 .dmg（内置 CLI），不再单独发布 macOS CLI tar.gz。
# 与 scripts/install.sh / scripts/install.ps1 约定一致。
name: Release binaries

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: crates/dashboard-ui/package-lock.json

      - name: Build dashboard UI
        run: ./scripts/build-dashboard-ui.sh

      - name: cargo build
        env:
          ANYCODE_BUILD_DASHBOARD_UI: "1"
        run: cargo build -p anycode --release --features embedded-ui,knowledge-embeddings --target ${{ matrix.target }}

      - name: Package tarball (unix)
        if: runner.os != 'Windows'
        id: pack_unix
        run: |
          ASSET_TARGET="${{ matrix.target }}"
          ASSET_TARGET="${ASSET_TARGET/-unknown-/-}"
          ASSET="anycode-${ASSET_TARGET}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czvf "$ASSET" anycode
          echo "path=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Package zip (windows)
        if: runner.os == 'Windows'
        id: pack_windows
        shell: pwsh
        run: |
          $asset = "anycode-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/anycode.exe" -DestinationPath $asset -Force
          "path=$asset" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack_unix.outputs.path || steps.pack_windows.outputs.path }}

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>anyCode</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #09090b;
        color: #f4f4f5;
      }
      .wrap {
        display: grid;
        place-content: center;
        height: 100%;
        text-align: center;
        gap: 12px;
      }
      .spinner {
        width: 28px;
        height: 28px;
        margin: 0 auto 8px;
        border: 3px solid rgba(255, 255, 255, 0.12);
        border-top-color: #818cf8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      p {
        margin: 0;
        color: #a1a1aa;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="spinner" aria-hidden="true"></div>
      <strong>anyCode Workbench</strong>
      <p id="status">正在启动本地服务…</p>
    </div>
  </body>
</html>
